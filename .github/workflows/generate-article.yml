name: Generate Daily PLD Article

on:
  schedule:
    # Run daily at 8:00 AM Mexico City time (14:00 UTC)
    - cron: '0 14 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai

      - name: Generate article
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/generate_article.py

      - name: Commit and push
        id: commit
        run: |
          git config user.name "PLD.mx Bot"
          git config user.email "bot@pld.mx"
          git add _posts/ assets/images/posts/

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          DATE=$(date +%Y-%m-%d)
          TITLE=$(ls -t _posts/*.md | head -1 | xargs head -3 | grep "title:" | sed 's/title: "//;s/"//')
          git commit -m "Nuevo artículo: ${TITLE:-$DATE}"
          git push origin main
          echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Trigger site deploy
        if: steps.commit.outputs.has_changes == 'true'
        run: gh workflow run jekyll.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
