name: Generate Daily PLD Article

on:
  schedule:
    # Run daily at 8:00 AM Mexico City time (14:00 UTC)
    - cron: '0 14 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai

      - name: Generate article
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/generate_article.py

      - name: Commit and push
        run: |
          git config user.name "PLD.mx Bot"
          git config user.email "bot@pld.mx"
          git add _posts/ assets/images/posts/

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          DATE=$(date +%Y-%m-%d)
          git commit -m "Nuevo artículo: ${DATE}"
          git push
