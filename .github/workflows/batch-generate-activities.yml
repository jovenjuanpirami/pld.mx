name: Batch Generate Activity Articles

# One-off: generates the 17 "Mejores sistemas automatizados PLD [Actividad]"
# articles (one per Art. 17 LFPIORPI fraction) and deploys them.
# Trigger manually from the Actions tab.

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai

      - name: Generate batch of 17 activity articles
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/generate_batch_activities.py

      - name: Commit and push
        id: commit
        run: |
          git config user.name "PLD.mx Bot"
          git config user.email "bot@pld.mx"
          git add _posts/ assets/images/posts/

          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          git commit -m "Batch: 17 artículos sobre sistemas PLD por actividad vulnerable"
          git push origin main
          echo "has_changes=true" >> $GITHUB_OUTPUT

    outputs:
      has_changes: ${{ steps.commit.outputs.has_changes }}

  build:
    runs-on: ubuntu-latest
    needs: generate
    if: needs.generate.outputs.has_changes == 'true'
    steps:
      - name: Checkout (with new articles)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Ruby
        uses: ruby/setup-ruby@4a9ddd6f338a97768b8006bf671dfbad383215f4
        with:
          ruby-version: '3.1'
          bundler-cache: true
          cache-version: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
